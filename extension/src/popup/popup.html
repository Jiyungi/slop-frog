<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Slop Frog</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Slop Frog</h1>
          <p>Feed filter</p>
        </div>
        <span class="frog" aria-hidden="true">
          <i></i>
          <i></i>
          <b></b>
        </span>
      </header>

      <section class="status-list" aria-label="Connection status">
        <div class="status-row">
          <span>Detector</span>
          <strong id="detectorStatus">Checking</strong>
        </div>
        <p class="detector-endpoint">
          Local endpoint <code id="detectorUrl">http://localhost:8765</code>
        </p>
        <div class="status-row">
          <span>Community</span>
          <strong id="supabaseStatus">Pending</strong>
        </div>
      </section>

      <section class="toggles" aria-label="Settings">
        <label>
          <span>Slop Score</span>
          <input id="showNumericScore" type="checkbox" />
        </label>
        <label>
          <span>Auto-filter</span>
          <input id="autoFilterRed" type="checkbox" />
        </label>
      </section>
    </main>

    <script src="../shared/runtime.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
